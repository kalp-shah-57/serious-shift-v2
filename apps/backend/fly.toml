# Fly.io config. `fly launch --no-deploy` then `fly deploy`. Rename `app` as needed.
app = "serious-shift-backend"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0   # scale to zero when idle (free-tier friendly)

[env]
  PORT = "8080"
