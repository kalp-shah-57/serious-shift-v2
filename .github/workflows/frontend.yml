name: frontend

# Builds the Next.js app (compile + lint + production build).
on:
  push:
    paths: ["apps/frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    paths: ["apps/frontend/**", ".github/workflows/frontend.yml"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
